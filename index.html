<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>根多帳 | 此花千鳥亭</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--ver:#c0392b;--verD:#8b2218;--verL:#e8a090;--verLL:#fce8e4;--washi:#faf7f2;--washiD:#f5ede6;--text:#2c1a18;--textS:#9a8a88}
body{font-family:'Noto Sans JP',sans-serif;background:var(--washi);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit;outline:none}
input:focus,select:focus{background:#fff5f3!important}
#header{background:var(--verD);color:white;padding:10px 14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(139,34,24,.4);display:flex;align-items:center;gap:8px}
.hbtn{border-radius:5px;padding:5px 10px;font-size:11px;font-weight:500;border:none;cursor:pointer}
.hbtn-red{background:var(--ver);color:white}
.hbtn-ghost{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3)}
.back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:white;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer}
#tab-bar{background:var(--verD);padding:0 10px 8px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:center}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);border:none;border-radius:16px;padding:5px 12px;font-size:12px;font-family:'Noto Serif JP',serif;white-space:nowrap;transition:all .15s;cursor:pointer}
.tab-btn.active{background:white;color:var(--verD);font-weight:600}
.tab-add-btn{background:rgba(255,255,255,.2);color:white;border:1px dashed rgba(255,255,255,.5);border-radius:16px;padding:4px 10px;font-size:14px;flex-shrink:0;cursor:pointer}
#search-bar{padding:10px 12px;background:var(--verLL);border-bottom:1px solid var(--verL);display:flex;gap:8px;align-items:center}
#search-input{flex:1;border:1px solid var(--verL);border-radius:6px;padding:7px 12px;font-size:13px;background:white;color:var(--text)}
#sort-bar{padding:7px 12px;background:var(--washiD);border-bottom:1px solid var(--verL);display:flex;gap:8px;align-items:center}
#sort-bar label{font-size:11px;color:var(--textS);font-family:'Noto Serif JP',serif}
#sort-select{border:1px solid var(--verL);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);background:white}
#view-top{padding:14px}
.sec-lbl{font-family:'Noto Serif JP',serif;font-size:12px;color:var(--textS);margin:16px 0 8px;padding-left:4px;border-left:3px solid var(--verL)}
.kai-card{background:white;border:1px solid var(--verL);border-left:4px solid var(--ver);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .12s}
.kai-card:active{background:var(--verLL)}
.kai-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600}
.kai-cnt{font-size:11px;color:var(--textS);margin-top:2px}
.sm-btn{background:none;border:1px solid var(--verL);border-radius:4px;padding:3px 7px;font-size:10px;color:var(--textS);cursor:pointer}
.sm-del{border-color:#fcc;color:#c66}
#view-list{padding:12px}
.ses-card{background:white;border:1px solid var(--verL);border-radius:8px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.ses-card:active{background:var(--verLL)}
.ses-badge{background:var(--ver);color:white;font-size:10px;padding:2px 7px;border-radius:10px;font-family:'Noto Serif JP',serif}
.ses-date{font-size:11px;color:var(--textS)}
.ses-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;margin:4px 0 3px}
.ses-prev{font-size:11px;color:var(--textS)}
#view-detail{padding:12px 12px 100px}
.det-head{background:var(--ver);color:white;border-radius:8px;padding:14px 16px;margin-bottom:12px}
.det-head .ddate{font-size:12px;opacity:.8;margin-bottom:4px}
.det-head .dtitle{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:600}
.det-head .dnum{font-size:11px;opacity:.75;margin-top:4px}
.ptable{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;border:1px solid var(--verL);margin-bottom:12px}
.ptable th{background:var(--verLL);color:var(--verD);font-family:'Noto Serif JP',serif;font-size:11px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--verL)}
.ptable td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--verLL)}
.ptable tr:last-child td{border-bottom:none}
.neta{font-family:'Noto Serif JP',serif;font-weight:600}
.enjya{color:var(--textS);font-size:12px}
.chuiri td{color:var(--textS);font-style:italic;font-size:12px;text-align:center;padding:5px}
#view-edit{padding:12px 12px 100px}
.esec{background:white;border:1px solid var(--verL);border-radius:8px;overflow:hidden;margin-bottom:10px}
.esec-ttl{background:var(--ver);color:white;font-family:'Noto Serif JP',serif;font-size:11px;padding:5px 10px}
.erow{display:flex;align-items:center;border-bottom:1px solid var(--verLL)}
.erow:last-child{border-bottom:none}
.elbl{background:var(--verLL);color:var(--verD);font-family:'Noto Serif JP',serif;font-size:10px;padding:0 8px;white-space:nowrap;min-width:60px;text-align:center;align-self:stretch;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--verL)}
.erow input{flex:1;border:none;background:transparent;padding:8px 10px;font-size:13px;color:var(--text)}
.prow{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--verLL);align-items:center}
.prow input{border:1px solid var(--verL);border-radius:4px;padding:5px 8px;font-size:12px;color:var(--text);background:transparent}
.pneta{flex:2}.penjya{flex:1}
.pdel{background:none;border:none;color:var(--verL);font-size:16px;padding:0 4px;cursor:pointer}
.apbtn{background:var(--verLL);color:var(--verD);border:1px dashed var(--verL);border-radius:6px;padding:7px;font-size:12px;width:calc(100% - 16px);margin:6px 8px 0;cursor:pointer}
.save-btn{position:fixed;bottom:20px;right:16px;background:var(--ver);color:white;border:none;border-radius:50px;padding:13px 26px;font-size:14px;font-family:'Noto Serif JP',serif;box-shadow:0 4px 18px rgba(192,57,43,.5);z-index:300;display:none;cursor:pointer}
.arow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.abtn{border-radius:6px;padding:7px 14px;font-size:12px;font-weight:500;border:none;cursor:pointer}
.abtn-e{background:var(--ver);color:white}
.abtn-t{background:var(--verLL);color:var(--verD);border:1px solid var(--verL)}
.abtn-p{background:var(--washiD);color:var(--text);border:1px solid var(--verL)}
.abtn-d{background:#fee;color:#c00;border:1px solid #fcc;margin-left:auto}
.add-ses{background:var(--ver);color:white;border:none;border-radius:8px;padding:12px;font-size:14px;font-family:'Noto Serif JP',serif;width:100%;margin-bottom:10px;box-shadow:0 2px 8px rgba(192,57,43,.3);cursor:pointer}
.add-kai{background:white;color:var(--ver);border:2px dashed var(--ver);border-radius:8px;padding:12px;font-size:14px;font-family:'Noto Serif JP',serif;width:100%;margin-top:8px;cursor:pointer}
#search-results{padding:12px}
.sri{background:white;border:1px solid var(--verL);border-left:4px solid var(--ver);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.sri:active{background:var(--verLL)}
.sri-k{font-size:10px;color:var(--ver);font-family:'Noto Serif JP',serif;margin-bottom:2px}
.sri-t{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600}
.sri-n{font-size:11px;color:var(--textS);margin-top:2px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--verD);color:white;padding:9px 20px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:500;white-space:nowrap}
#toast.show{opacity:1}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:600;padding:20px}
#ov.on{display:flex}
#dlgbox{background:white;border-radius:12px;padding:22px;max-width:340px;width:100%}
#dlgt{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--verD);margin-bottom:8px}
#dlgm{font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.7;white-space:pre-wrap}
#dlgi{width:100%;border:1px solid var(--verL);border-radius:6px;padding:9px 12px;font-size:14px;color:var(--text);margin-bottom:12px;display:none}
#dlgbtn{display:flex;gap:10px;justify-content:flex-end}
.dc{border:1px solid var(--verL);background:white;color:var(--textS);border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer}
.do{background:var(--ver);color:white;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.hidden{display:none!important}
@media print{#header,#tab-bar,#search-bar,#sort-bar,.arow,.save-btn,#ov{display:none!important}body{background:white}.det-head{background:var(--verD)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<div id="header">
  <button id="bbk" class="back-btn hidden">◀ 戻る</button>
  <div style="flex:1">
    <div id="htitle" style="font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:.06em">根多帳</div>
    <div style="font-size:9px;opacity:.6;margin-top:1px">此花千鳥亭</div>
  </div>
  <button id="bsrch" class="hbtn hbtn-ghost">検索</button>
  <button id="bbak" class="hbtn hbtn-red">保存</button>
</div>
<div id="tab-bar"></div>
<div id="search-bar" class="hidden">
  <input id="sinp" placeholder="演目・演者・会名で検索…">
  <button id="bsc" class="hbtn hbtn-ghost" style="padding:6px 10px">✕</button>
</div>
<div id="sort-bar" class="hidden">
  <label>並び替え：</label>
  <select id="srt">
    <option value="dd">日付（新しい順）</option>
    <option value="da">日付（古い順）</option>
    <option value="kd">回数（降順）</option>
    <option value="ka">回数（昇順）</option>
    <option value="ta">タイトル順</option>
  </select>
</div>
<div id="view-top" class="hidden"></div>
<div id="view-list" class="hidden"></div>
<div id="view-detail" class="hidden"></div>
<div id="view-edit" class="hidden"></div>
<div id="search-results" class="hidden"></div>
<button id="sbtn" class="save-btn">保存する ✓</button>
<div id="toast"></div>
<div id="ov"><div id="dlgbox">
  <div id="dlgt"></div><div id="dlgm"></div>
  <input id="dlgi" type="text">
  <div id="dlgbtn"><button class="dc" id="dlgc">キャンセル</button><button class="do" id="dlgo">OK</button></div>
</div></div>

<script>
var REG=['\u9023\u7d9a\u8b1b\u8ac7\u5343\u9ce5\u4ead','\u6708\u66dc\u304a\u663c\u5bc4\u5e2d','\u6c34\u66dc\u5343\u9ce5\u4ead','\u663c\u304b\u3089\u6728\u66dc\u5bc4\u5e2d'];
var DB={},CT=null,CI=null,STK=[],DRT=false,SRT='dd',DOK=null;

function ytabs(){var y=new Date().getFullYear(),a=[];for(var i=2019;i<=y+1;i++)a.push(String(i));return a;}
function otabs(){var f=new Set(ytabs().concat(REG));return Object.keys(DB).filter(function(k){return!f.has(k)&&k!=='\u30fc';});}
function sdb(){try{localStorage.setItem('netacho_v1',JSON.stringify(DB));}catch(e){}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// DB\u521d\u671f\u5316
try{var sv=localStorage.getItem('netacho_v1');if(sv)DB=JSON.parse(sv);}catch(e){}
if(!Object.keys(DB).length){
  try{DB=JSON.parse(atob(__ND_B64__));}catch(e){DB={};}
}
(function(){var y=new Date().getFullYear();for(var i=2019;i<=y+1;i++){var k=String(i);if(!DB[k])DB[k]=[];}REG.forEach(function(t){if(!DB[t])DB[t]=[];});})();

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function dlg(o){
  DOK=o.onOk;
  document.getElementById('dlgt').textContent=o.title||'';
  document.getElementById('dlgm').textContent=o.msg||'';
  var i=document.getElementById('dlgi');
  if(o.inp){i.style.display='block';i.value=o.val||'';i.placeholder=o.ph||'';setTimeout(function(){i.focus();},100);}
  else i.style.display='none';
  document.getElementById('dlgo').textContent=o.ok||'OK';
  document.getElementById('ov').classList.add('on');
}
document.getElementById('dlgc').onclick=function(){document.getElementById('ov').classList.remove('on');};
document.getElementById('dlgo').onclick=function(){document.getElementById('ov').classList.remove('on');if(DOK)DOK(document.getElementById('dlgi').value);};

function showV(n){
  ['top','list','detail','edit','search-results'].forEach(function(v){
    document.getElementById('view-'+v).classList.toggle('hidden',v!==n);
  });
  document.getElementById('sort-bar').classList.toggle('hidden',n!=='list');
}
function push(n){STK.push(n);showV(n);document.getElementById('bbk').classList.remove('hidden');}
function back(){
  if(DRT){sdb();DRT=false;document.getElementById('sbtn').style.display='none';}
  STK.pop();var p=STK[STK.length-1]||'top';
  showV(p);
  if(!STK.length){document.getElementById('bbk').classList.add('hidden');document.getElementById('htitle').textContent='\u6839\u591a\u5e33';bldTop();}
  else if(p==='list')bldList(CT);
  else if(p==='detail')bldDet(CI);
}
document.getElementById('bbk').onclick=back;

function bldTabs(){
  var bar=document.getElementById('tab-bar');bar.innerHTML='';
  ytabs().concat(REG).concat(otabs()).forEach(function(t){
    var b=document.createElement('button');
    b.className='tab-btn'+(t===CT?' active':'');
    b.textContent=t;b.onclick=(function(x){return function(){openTab(x);};})(t);
    bar.appendChild(b);
  });
  var p=document.createElement('button');p.className='tab-add-btn';p.textContent='\uff0b';p.onclick=addKai;bar.appendChild(p);
}
function openTab(t){CT=t;STK=[];bldTabs();bldList(t);push('list');document.getElementById('bbk').classList.remove('hidden');}

function bldTop(){
  var el=document.getElementById('view-top'),yt=ytabs(),ot=otabs(),h='';
  h+='<div class="sec-lbl">\u5e74\u5225</div>';
  yt.forEach(function(t){var n=(DB[t]||[]).length;h+='<div class="kai-card" onclick="openTab(''+t+'')"><div><div class="kai-name">'+t+'\u5e74</div><div class="kai-cnt">'+n+'\u4ef6</div></div><span style="color:var(--verL);font-size:20px">\u203a</span></div>';});
  h+='<div class="sec-lbl">\u5b9a\u671f\u4f1a</div>';
  REG.forEach(function(t){var n=(DB[t]||[]).length;h+='<div class="kai-card" onclick="openTab(''+t+'')"><div><div class="kai-name">'+t+'</div><div class="kai-cnt">'+n+'\u4ef6</div></div><div style="display:flex;gap:6px;align-items:center"><button class="sm-btn" onclick="event.stopPropagation();rnmKai(''+t+'')">\u540d\u524d\u5909\u66f4</button><span style="color:var(--verL);font-size:20px">\u203a</span></div></div>';});
  if(ot.length){
    h+='<div class="sec-lbl">\u305d\u306e\u4ed6\u306e\u4f1a</div>';
    ot.forEach(function(t){var n=(DB[t]||[]).length;h+='<div class="kai-card" onclick="openTab(''+t+'')"><div><div class="kai-name">'+t+'</div><div class="kai-cnt">'+n+'\u4ef6</div></div><div style="display:flex;gap:6px;align-items:center"><button class="sm-btn" onclick="event.stopPropagation();rnmKai(''+t+'')">\u540d\u524d\u5909\u66f4</button><button class="sm-btn sm-del" onclick="event.stopPropagation();delKai(''+t+'')">\u524a\u9664</button><span style="color:var(--verL);font-size:20px">\u203a</span></div></div>';});
  }
  h+='<button class="add-kai" onclick="addKai()">\uff0b \u65b0\u3057\u3044\u4f1a\u3092\u8ffd\u52a0</button>';
  el.innerHTML=h;
}

function srted(tab){
  var s=(DB[tab]||[]).map(function(x,i){return Object.assign({},x,{_i:i});});
  if(SRT==='da')return s.sort(function(a,b){return String(a.date).localeCompare(String(b.date));});
  if(SRT==='dd')return s.sort(function(a,b){return String(b.date).localeCompare(String(a.date));});
  if(SRT==='ka')return s.sort(function(a,b){return Number(a.kaisu||0)-Number(b.kaisu||0);});
  if(SRT==='kd')return s.sort(function(a,b){return Number(b.kaisu||0)-Number(a.kaisu||0);});
  if(SRT==='ta')return s.sort(function(a,b){return String(a.title||'').localeCompare(String(b.title||''),'ja');});
  return s.slice().reverse();
}

function bldList(tab){
  document.getElementById('htitle').textContent=tab;
  var fxd=new Set(ytabs().concat(REG)),h='<button class="add-ses" onclick="newSes()">\uff0b \u65b0\u3057\u3044\u56de\u3092\u8ffd\u52a0</button>';
  if(!fxd.has(tab))h+='<div style="display:flex;gap:8px;margin-bottom:10px"><button class="abtn abtn-t" onclick="rnmKai(''+tab+'')">\u270f\ufe0f \u4f1a\u540d\u5909\u66f4</button><button class="abtn abtn-d" onclick="delKai(''+tab+'')">\u1f5d1 \u524a\u9664</button></div>';
  var s=srted(tab);
  if(!s.length)h+='<div style="text-align:center;padding:40px;color:var(--textS);font-family:'Noto Serif JP',serif">\u307e\u3060\u8a18\u9332\u304c\u3042\u308a\u307e\u305b\u3093</div>';
  else s.forEach(function(x){
    var pv=x.programs.filter(function(p){return p.neta&&!p.neta.includes('\u4e2d\u5165')&&!p.neta.includes('\u4ef2\u5165');}).slice(0,2).map(function(p){return p.neta;}).join('\u30fb');
    h+='<div class="ses-card" onclick="opnSes('+x._i+')"><div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">'+(x.kaisu?'<span class="ses-badge">\u7b2c'+x.kaisu+'\u56de</span>':'')+'<span class="ses-date">'+esc(x.date)+'</span></div><div class="ses-title">'+esc(x.title||'\uff08\u30bf\u30a4\u30c8\u30eb\u306a\u3057\uff09')+'</div><div class="ses-prev">'+esc(pv||'\u6f14\u76ee\u8a18\u9332\u306a\u3057')+'</div></div>';
  });
  document.getElementById('view-list').innerHTML=h;
}
document.getElementById('srt').onchange=function(){SRT=this.value;bldList(CT);};

function opnSes(i){CI=i;bldDet(i);push('detail');}
function bldDet(i){
  var s=DB[CT][i];
  var rows=s.programs.map(function(p){
    if(!p.neta)return'';
    var c=p.neta.includes('\u4e2d\u5165')||p.neta.includes('\u4ef2\u5165');
    return c?'<tr class="chuiri"><td colspan="2">\u2015 '+esc(p.neta)+' \u2015</td></tr>':'<tr><td class="neta">'+esc(p.neta)+'</td><td class="enjya">'+esc(p.enjya||'')+'</td></tr>';
  }).join('');
  document.getElementById('view-detail').innerHTML='<div class="arow"><button class="abtn abtn-e" onclick="opnEdit('+i+')">\u270f\ufe0f \u7de8\u96c6</button><button class="abtn abtn-t" onclick="expTxt('+i+')">\u1f4cb \u30c6\u30ad\u30b9\u30c8</button><button class="abtn abtn-p" onclick="window.print()">\u1f5a8 \u5370\u5237</button><button class="abtn abtn-d" onclick="delSes('+i+')">\u524a\u9664</button></div><div class="det-head">'+(s.kaisu?'<div class="dnum">\u7b2c'+s.kaisu+'\u56de</div>':'')+'<div class="ddate">'+esc(s.date)+'</div><div class="dtitle">'+esc(s.title||'\uff08\u30bf\u30a4\u30c8\u30eb\u306a\u3057\uff09')+'</div></div><table class="ptable"><thead><tr><th>\u6f14\u3000\u76ee</th><th>\u6f14\u3000\u8005</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function opnEdit(i){CI=i;bldEdit(i);push('edit');document.getElementById('sbtn').style.display='block';}
function newSes(){if(!DB[CT])DB[CT]=[];DB[CT].push({kaisu:'',date:'',title:'',programs:[{neta:'',enjya:''}]});CI=DB[CT].length-1;bldEdit(CI);push('edit');document.getElementById('sbtn').style.display='block';}
function bldEdit(i){
  var s=DB[CT][i];
  var rows=s.programs.map(function(p,j){return'<div class="prow"><input class="pneta" placeholder="\u6f14\u76ee" value="'+esc(p.neta)+'" oninput="upP('+j+','neta',this.value)"><input class="penjya" placeholder="\u6f14\u8005" value="'+esc(p.enjya)+'" oninput="upP('+j+','enjya',this.value)"><button class="pdel" onclick="dlP('+j+')">\u2715</button></div>';}).join('');
  document.getElementById('view-edit').innerHTML='<div class="esec"><div class="esec-ttl">\u57fa\u672c\u60c5\u5831</div><div class="erow"><div class="elbl">\u56de\u6570</div><input value="'+esc(s.kaisu)+'" placeholder="\u4f8b\uff1a12" oninput="upF('kaisu',this.value)"></div><div class="erow"><div class="elbl">\u65e5\u6642</div><input value="'+esc(s.date)+'" placeholder="\u4f8b\uff1a2024.3.15" oninput="upF('date',this.value)"></div><div class="erow"><div class="elbl">\u30bf\u30a4\u30c8\u30eb</div><input value="'+esc(s.title)+'" placeholder="\u4f1a\u306e\u540d\u524d\u30fb\u30b5\u30d6\u30bf\u30a4\u30c8\u30eb" oninput="upF('title',this.value)"></div></div><div class="esec"><div class="esec-ttl">\u756a\u7d44</div><div id="pl">'+rows+'</div><button class="apbtn" onclick="adP()">\uff0b \u6f14\u76ee\u3092\u8ffd\u52a0</button><button class="apbtn" style="margin-top:4px;margin-bottom:8px" onclick="adC()">\uff0b \u4e2d\u5165\u308a\u3092\u8ffd\u52a0</button></div>';
}
function upF(k,v){DB[CT][CI][k]=v;DRT=true;}
function upP(i,k,v){DB[CT][CI].programs[i][k]=v;DRT=true;}
function adP(){DB[CT][CI].programs.push({neta:'',enjya:''});bldEdit(CI);DRT=true;}
function adC(){DB[CT][CI].programs.push({neta:'\u4e2d\u5165\u308a',enjya:''});bldEdit(CI);DRT=true;}
function dlP(i){DB[CT][CI].programs.splice(i,1);bldEdit(CI);DRT=true;}
function delSes(i){dlg({title:'\u78ba\u8a8d',msg:'\u3053\u306e\u56de\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f
\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002',ok:'\u524a\u9664\u3059\u308b',onOk:function(){DB[CT].splice(i,1);sdb();toast('\u524a\u9664\u3057\u307e\u3057\u305f');back();bldList(CT);}});}
document.getElementById('sbtn').onclick=function(){sdb();DRT=false;document.getElementById('sbtn').style.display='none';toast('\u4fdd\u5b58\u3057\u307e\u3057\u305f \u2713');};

function addKai(){dlg({title:'\u65b0\u3057\u3044\u4f1a\u3092\u8ffd\u52a0',inp:true,ph:'\u4f1a\u306e\u540d\u524d\u3092\u5165\u529b\u2026',ok:'\u8ffd\u52a0\u3059\u308b',onOk:function(n){n=(n||'').trim();if(!n){toast('\u540d\u524d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');return;}if(DB[n]!==undefined){toast('\u305d\u306e\u540d\u524d\u306f\u3059\u3067\u306b\u3042\u308a\u307e\u3059');return;}DB[n]=[];sdb();bldTabs();bldTop();toast('\u300c'+n+'\u300d\u3092\u8ffd\u52a0\u3057\u307e\u3057\u305f');}});}
function rnmKai(tab){dlg({title:'\u4f1a\u540d\u3092\u5909\u66f4',inp:true,val:tab,ok:'\u5909\u66f4\u3059\u308b',onOk:function(n){n=(n||'').trim();if(!n||n===tab)return;if(DB[n]!==undefined){toast('\u305d\u306e\u540d\u524d\u306f\u3059\u3067\u306b\u3042\u308a\u307e\u3059');return;}DB[n]=DB[tab];delete DB[tab];sdb();if(CT===tab)CT=n;bldTabs();if(STK.includes('list'))bldList(CT);else bldTop();toast('\u300c'+n+'\u300d\u306b\u5909\u66f4\u3057\u307e\u3057\u305f');}});}
function delKai(tab){var n=(DB[tab]||[]).length;dlg({title:'\u300c'+tab+'\u300d\u3092\u524a\u9664',msg:'\u8a18\u9332'+n+'\u4ef6\u3092\u3059\u3079\u3066\u524a\u9664\u3057\u307e\u3059\u3002
\u5143\u306b\u623b\u305b\u307e\u305b\u3093\u3002',ok:'\u524a\u9664\u3059\u308b',onOk:function(){delete DB[tab];sdb();if(CT===tab){CT=null;STK=[];showV('top');document.getElementById('bbk').classList.add('hidden');document.getElementById('htitle').textContent='\u6839\u591a\u5e33';}bldTabs();bldTop();toast('\u300c'+tab+'\u300d\u3092\u524a\u9664\u3057\u307e\u3057\u305f');}});}

document.getElementById('bsrch').onclick=function(){document.getElementById('search-bar').classList.remove('hidden');showV('search-results');document.getElementById('search-results').innerHTML='<div style="text-align:center;padding:30px;color:var(--textS)">\u30ad\u30fc\u30ef\u30fc\u30c9\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044</div>';document.getElementById('sinp').focus();};
document.getElementById('bsc').onclick=function(){document.getElementById('search-bar').classList.add('hidden');document.getElementById('sinp').value='';if(STK.length)showV(STK[STK.length-1]);else{showV('top');bldTop();}};
document.getElementById('sinp').addEventListener('input',function(){
  var q=this.value.trim(),el=document.getElementById('search-results');
  if(!q){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--textS)">\u30ad\u30fc\u30ef\u30fc\u30c9\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044</div>';return;}
  var res=[];
  Object.keys(DB).forEach(function(tab){(DB[tab]||[]).forEach(function(s,i){if(s.programs.some(function(p){return(p.neta||'').includes(q)||(p.enjya||'').includes(q);})||(s.title||'').includes(q)||(s.date||'').includes(q))res.push({tab:tab,i:i,s:s});});});
  if(!res.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--textS)">\u300c'+esc(q)+'\u300d\u306f\u898b\u3064\u304b\u308a\u307e\u305b\u3093\u3067\u3057\u305f</div>';return;}
  el.innerHTML='<div style="font-size:11px;color:var(--textS);margin-bottom:8px">'+res.length+'\u4ef6\u898b\u3064\u304b\u308a\u307e\u3057\u305f</div>'+res.map(function(r){
    var h=r.s.programs.filter(function(p){return(p.neta||'').includes(q)||(p.enjya||'').includes(q);}).map(function(p){return p.neta+(p.enjya?' '+p.enjya:'');}).join('\u30fb');
    return'<div class="sri" onclick="frmSrch(''+esc(r.tab)+'','+r.i+')"><div class="sri-k">'+esc(r.tab)+(r.s.kaisu?' \u7b2c'+r.s.kaisu+'\u56de':'')+'</div><div class="sri-t">'+esc(r.s.date)+' '+esc(r.s.title)+'</div>'+(h?'<div class="sri-n">\u1f3ad '+esc(h)+'</div>':'')+'</div>';
  }).join('');
});
function frmSrch(tab,i){CT=tab;CI=i;document.getElementById('search-bar').classList.add('hidden');document.getElementById('sinp').value='';STK=[];bldTabs();bldList(tab);push('list');opnSes(i);}

document.getElementById('bbak').onclick=function(){
  var j=JSON.stringify({version:'1.0',exported:new Date().toISOString(),data:DB},null,2);
  var b=new Blob([j],{type:'application/json'});var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='netacho_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(u);toast('\u30d0\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4fdd\u5b58\u3057\u307e\u3057\u305f');
};

// \u8d77\u52d5
bldTabs();bldTop();showV('top');
</script>
</body>
</html>
