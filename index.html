<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>根多帳 | 此花千鳥亭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--ver:#c0392b;--verD:#8b2218;--verL:#e8a090;--verLL:#fce8e4;--washi:#faf7f2;--washiD:#f5ede6;--text:#2c1a18;--textS:#9a8a88}
body{font-family:'Noto Sans JP',sans-serif;background:var(--washi);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit;outline:none}
input:focus,select:focus{background:#fff5f3!important}
#header{background:var(--verD);color:white;padding:10px 14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(139,34,24,.4);display:flex;align-items:center;gap:8px}
.hbtn{border-radius:5px;padding:5px 10px;font-size:11px;font-weight:500;border:none;cursor:pointer}
.hbtn-red{background:var(--ver);color:white}
.hbtn-ghost{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3)}
.back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:white;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer}
#tab-bar{background:var(--verD);padding:0 10px 8px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:center}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);border:none;border-radius:16px;padding:5px 12px;font-size:12px;font-family:'Noto Serif JP',serif;white-space:nowrap;transition:all .15s;cursor:pointer}
.tab-btn.active{background:white;color:var(--verD);font-weight:600}
.tab-add-btn{background:rgba(255,255,255,.2);color:white;border:1px dashed rgba(255,255,255,.5);border-radius:16px;padding:4px 10px;font-size:14px;flex-shrink:0;cursor:pointer}
#search-bar{padding:10px 12px;background:var(--verLL);border-bottom:1px solid var(--verL);display:flex;gap:8px;align-items:center}
#search-input{flex:1;border:1px solid var(--verL);border-radius:6px;padding:7px 12px;font-size:13px;background:white;color:var(--text)}
#sort-bar{padding:7px 12px;background:var(--washiD);border-bottom:1px solid var(--verL);display:flex;gap:8px;align-items:center}
#sort-bar label{font-size:11px;color:var(--textS);font-family:'Noto Serif JP',serif}
#sort-select{border:1px solid var(--verL);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);background:white}
#view-top{padding:14px}
#export-menu{position:absolute;top:56px;right:12px;background:white;border:1px solid var(--verL);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:200;min-width:180px}
.emenu-item{display:block;width:100%;padding:12px 16px;text-align:left;background:none;border:none;font-size:14px;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.emenu-item:hover{background:var(--verLL)}
#top-sort{padding:8px 14px 0;display:flex;gap:8px;align-items:center}
#top-sort select{border:1px solid var(--verL);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);background:white}
.sec-lbl{font-family:'Noto Serif JP',serif;font-size:12px;color:var(--textS);margin:16px 0 8px;padding-left:4px;border-left:3px solid var(--verL)}
.kai-card{background:white;border:1px solid var(--verL);border-left:4px solid var(--ver);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .12s}
.kai-card:active{background:var(--verLL)}
.kai-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600}
.kai-cnt{font-size:11px;color:var(--textS);margin-top:2px}
.sm-btn{background:none;border:1px solid var(--verL);border-radius:4px;padding:3px 7px;font-size:10px;color:var(--textS);cursor:pointer}
.sm-del{border-color:#fcc;color:#c66}
#view-list{padding:12px}
.ses-card{background:white;border:1px solid var(--verL);border-radius:8px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.ses-card:active{background:var(--verLL)}
.ses-badge{background:var(--ver);color:white;font-size:10px;padding:2px 7px;border-radius:10px;font-family:'Noto Serif JP',serif}
.ses-date{font-size:11px;color:var(--textS)}
.ses-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;margin:4px 0 3px}
.ses-prev{font-size:11px;color:var(--textS)}
#view-detail{padding:12px 12px 100px}
.det-head{background:var(--ver);color:white;border-radius:8px;padding:14px 16px;margin-bottom:12px}
.det-head .ddate{font-size:12px;opacity:.8;margin-bottom:4px}
.det-head .dtitle{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:600}
.det-head .dnum{font-size:11px;opacity:.75;margin-top:4px}
.ptable{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;border:1px solid var(--verL);margin-bottom:12px}
.ptable th{background:var(--verLL);color:var(--verD);font-family:'Noto Serif JP',serif;font-size:11px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--verL)}
.ptable td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--verLL)}
.ptable tr:last-child td{border-bottom:none}
.neta{font-family:'Noto Serif JP',serif;font-weight:600}
.enjya{color:var(--textS);font-size:12px}
.chuiri td{color:var(--textS);font-style:italic;font-size:12px;text-align:center;padding:5px}
#view-edit{padding:12px 12px 100px}
.esec{background:white;border:1px solid var(--verL);border-radius:8px;overflow:hidden;margin-bottom:10px}
.esec-ttl{background:var(--ver);color:white;font-family:'Noto Serif JP',serif;font-size:11px;padding:5px 10px}
.erow{display:flex;align-items:center;border-bottom:1px solid var(--verLL)}
.erow:last-child{border-bottom:none}
.elbl{background:var(--verLL);color:var(--verD);font-family:'Noto Serif JP',serif;font-size:10px;padding:0 8px;white-space:nowrap;min-width:60px;text-align:center;align-self:stretch;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--verL)}
.erow input{flex:1;border:none;background:transparent;padding:8px 10px;font-size:13px;color:var(--text)}
.prow{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--verLL);align-items:center}
.prow input{border:1px solid var(--verL);border-radius:4px;padding:5px 8px;font-size:12px;color:var(--text);background:transparent}
.pneta{flex:2}.penjya{flex:1}
.pdel{background:none;border:none;color:var(--verL);font-size:16px;padding:0 4px;cursor:pointer}
.apbtn{background:var(--verLL);color:var(--verD);border:1px dashed var(--verL);border-radius:6px;padding:7px;font-size:12px;width:calc(100% - 16px);margin:6px 8px 0;cursor:pointer}
.save-btn{position:fixed;bottom:20px;right:16px;background:var(--ver);color:white;border:none;border-radius:50px;padding:13px 26px;font-size:14px;font-family:'Noto Serif JP',serif;box-shadow:0 4px 18px rgba(192,57,43,.5);z-index:300;display:none;cursor:pointer}
.arow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.abtn{border-radius:6px;padding:7px 14px;font-size:12px;font-weight:500;border:none;cursor:pointer}
.abtn-e{background:var(--ver);color:white}
.abtn-t{background:var(--verLL);color:var(--verD);border:1px solid var(--verL)}
.abtn-p{background:var(--washiD);color:var(--text);border:1px solid var(--verL)}
.abtn-d{background:#fee;color:#c00;border:1px solid #fcc;margin-left:auto}
.add-ses{background:var(--ver);color:white;border:none;border-radius:8px;padding:12px;font-size:14px;font-family:'Noto Serif JP',serif;width:100%;margin-bottom:10px;box-shadow:0 2px 8px rgba(192,57,43,.3);cursor:pointer}
.add-kai{background:white;color:var(--ver);border:2px dashed var(--ver);border-radius:8px;padding:12px;font-size:14px;font-family:'Noto Serif JP',serif;width:100%;margin-top:8px;cursor:pointer}
#search-results{padding:12px}
.sri{background:white;border:1px solid var(--verL);border-left:4px solid var(--ver);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.sri:active{background:var(--verLL)}
.sri-k{font-size:10px;color:var(--ver);font-family:'Noto Serif JP',serif;margin-bottom:2px}
.sri-t{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600}
.sri-n{font-size:11px;color:var(--textS);margin-top:2px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--verD);color:white;padding:9px 20px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:500;white-space:nowrap}
#toast.show{opacity:1}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:600;padding:20px}
#ov.on{display:flex}
#ov.on{display:flex}
#dlgbox{background:white;border-radius:12px;padding:22px;max-width:340px;width:100%}
#dlgt{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;color:var(--verD);margin-bottom:8px}
#dlgm{font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.7;white-space:pre-wrap}
#dlgi{width:100%;border:1px solid var(--verL);border-radius:6px;padding:9px 12px;font-size:14px;color:var(--text);margin-bottom:12px;display:none}
#dlgbtn{display:flex;gap:10px;justify-content:flex-end}
.dc{border:1px solid var(--verL);background:white;color:var(--textS);border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer}
.do{background:var(--ver);color:white;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.list-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;font-family:'Noto Serif JP',serif;font-weight:700;font-size:16px;color:var(--text);border-bottom:1px solid var(--verL)}
.hidden{display:none!important}
@media print{#header,#tab-bar,#search-bar,#sort-bar,.arow,.save-btn,#ov{display:none!important}body{background:white}.det-head{background:var(--verD)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}

</style>
</head>

<div id="app">
  <header id="hdr">
    <div id="htitle-wrap">
      <div id="htitle">根多帳</div>
      <div id="hsubtitle">此花千鳥亭</div>
    </div>
    <div id="hbtns">
      <button id="bsch" class="hbtn hbtn-out">検索</button>
      <button id="bsv" class="hbtn hbtn-fill">書き出し ▾</button>
    </div>
    <div id="export-menu" class="hidden">
      <button class="emenu-item" data-act="json">💾 JSONバックアップ</button>
      <button class="emenu-item" data-act="txt">📄 テキスト書き出し</button>
      <button class="emenu-item" data-act="print">🖨 印刷・PDF</button>
    </div>
  </header>

  <div id="search-bar" class="hidden">
    <input id="sinp" placeholder="演目・演者・会名で検索…">
    <button id="bsc" class="hbtn hbtn-out">閉じる</button>

  <div id="sort-bar" class="hidden">
    <select id="sort-sel">
      <option value="date-desc">日付新しい順</option>
      <option value="date-asc">日付古い順</option>
      <option value="kaisu-asc">回数少ない順</option>
      <option value="kaisu-desc">回数多い順</option>
      <option value="title-asc">演目名 A→Z</option>
      <option value="title-desc">演目名 Z→A</option>
    </select>
  </div>

  <div id="tab-bar" class="hidden"></div>

  <div id="view-top"></div>
  <div id="view-list" class="hidden"></div>
  <div id="view-detail" class="hidden"></div>
  <div id="view-edit" class="hidden"></div>
  <div id="view-search-results" class="hidden"></div>
</div>

<button id="bbk" class="hidden">← 戻る</button>

<div id="ov" class="ov">
  <div class="dlg">
    <div id="dlgt" class="dlg-title"></div>
    <input id="dlgi" class="dlg-inp" type="text">
    <div class="dlg-btns">
      <button id="dlgc" class="sm-btn">キャンセル</button>
      <button id="dlgo" class="sm-btn sm-btn-ok">OK</button>
    </div>
  </div>
</div>

<div id="toast" class="toast-msg hidden"></div>

var DB = {};

// Load from localStorage
try {
  var sv = localStorage.getItem('netacho_v1');
  if (sv) {
    var parsed = JSON.parse(sv);
    if (Object.keys(parsed).length > 0) DB = parsed;
  }
} catch(e) {}

// Fall back to bundled data
if (Object.keys(DB).length === 0) {
  DB = JSON.parse(JSON.stringify(ND));
}

var REG = [
  '\u9023\u7d9a\u8b1b\u8ac7\u5343\u9ce5\u4ead',
  '\u6708\u66dc\u304a\u6607\u5bc4\u5e2d',

  '\u6607\u304b\u3089\u6728\u66dc\u5bc4\u5e2d'
];

function sdb() {
  try { localStorage.setItem('netacho_v1', JSON.stringify(DB)); } catch(e) {}
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(function(){ el.classList.add('hidden'); }, 2000);
}

function ytabs() {
  var y = new Date().getFullYear();
  var yrs = [];
  for (var i = y; i >= 2019; i--) yrs.push(String(i));
  return yrs;
}

function otabs() {
  return Object.keys(DB).filter(function(k){ return REG.indexOf(k)===-1 && ytabs().indexOf(k)===-1; });
}

function showV(name) {
  var views = ['top','list','detail','edit','search-results'];
  for (var i=0; i<views.length; i++) {
    var el = document.getElementById('view-' + views[i]);
    if (el) {
      if (views[i] === name) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }
  }
  var sb = document.getElementById('sort-bar');
  if (sb) {
    if (name === 'list') sb.classList.remove('hidden');
    else sb.classList.add('hidden');
  }
}

function push(name) {
  STK.push(name);
  showV(name);
  var bbk = document.getElementById('bbk');
  if (STK.length > 1) bbk.classList.remove('hidden');
  else bbk.classList.add('hidden');
}

function back() {
  if (STK.length > 1) STK.pop();
  var cur = STK[STK.length-1];
  showV(cur);
  var bbk = document.getElementById('bbk');
  if (STK.length > 1) bbk.classList.remove('hidden');
  else bbk.classList.add('hidden');
}

function bldTabs() {
  var bar = document.getElementById('tab-bar');
  if (!CT) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = '';
  var allTabs = ytabs().concat(REG).concat(otabs());
  for (var i=0; i<allTabs.length; i++) {
    (function(t){
      var b = document.createElement('button');
      b.className = 'tab-btn' + (t===CT?' active':'');
      b.textContent = t;
      b.onclick = function(){ openTab(t); };
      bar.appendChild(b);
    })(allTabs[i]);
  }
  var p = document.createElement('button');
  p.className = 'tab-btn tab-add';
  p.textContent = '+';
  p.onclick = addKai;
  bar.appendChild(p);
}

function bldTop() {
  var el = document.getElementById('view-top');
  var yt = ytabs();
  var ot = otabs();
  var TSORT = window.TOP_SORT || 'default';
  var h = '';

  h += '<div id="top-sort"><span style="font-size:12px;color:var(--textS)">\u4e26\u3073\u66ff\u3048:</span>' +
       '<select id="top-sort-sel">' +
       '<option value="default"' + (TSORT==='default'?' selected':'') + '>\u6a19\u6e96</option>' +
       '<option value="name-asc"' + (TSORT==='name-asc'?' selected':'') + '>\u540d\u524d A\u2192Z</option>' +
       '<option value="name-desc"' + (TSORT==='name-desc'?' selected':'') + '>\u540d\u524d Z\u2192A</option>' +
       '<option value="cnt-desc"' + (TSORT==='cnt-desc'?' selected':'') + '>\u4ef6\u6570\u591a\u3044\u9806</option>' +
       '<option value="cnt-asc"' + (TSORT==='cnt-asc'?' selected':'') + '>\u4ef6\u6570\u5c11\u3044\u9806</option>' +
       '</select></div>';

  // 年号もTSORT適用
  var sortedYT = yt.slice();
  if (TSORT === 'name-asc' || TSORT === 'cnt-asc') {
    sortedYT.sort(function(a,b){ return parseInt(a)-parseInt(b); });
  } else if (TSORT === 'name-desc') {
    sortedYT.sort(function(a,b){ return parseInt(b)-parseInt(a); });
  } else if (TSORT === 'cnt-desc') {
    sortedYT.sort(function(a,b){ return (DB[b]||[]).length-(DB[a]||[]).length; });
  }

  h += '<div class="sec-lbl">\u5e74\u5225</div>';
  for (var i=0; i<sortedYT.length; i++) {
    var t = sortedYT[i];
    var n = (DB[t]||[]).length;
    h += '<div class="kai-card" data-tab="'+esc(t)+'">' +
         '<div><div class="kai-name">'+esc(t)+'\u5e74</div>' +
         '<div class="kai-cnt">'+n+'\u4ef6</div></div>' +
         '<span style="color:var(--verL);font-size:20px">\u203a</span></div>';
  }

  var sortedREG = REG.slice();
  if (TSORT === 'name-asc') sortedREG.sort(function(a,b){ return a.localeCompare(b,'ja'); });
  else if (TSORT === 'name-desc') sortedREG.sort(function(a,b){ return b.localeCompare(a,'ja'); });
  else if (TSORT === 'cnt-desc') sortedREG.sort(function(a,b){ return (DB[b]||[]).length-(DB[a]||[]).length; });
  else if (TSORT === 'cnt-asc') sortedREG.sort(function(a,b){ return (DB[a]||[]).length-(DB[b]||[]).length; });

  h += '<div class="sec-lbl">\u5b9a\u671f\u4f1a</div>';
  for (var j=0; j<sortedREG.length; j++) { var REG_j = sortedREG[j];
    var t2 = REG_j;
    var n2 = (DB[t2]||[]).length;
    h += '<div class="kai-card" data-tab="'+esc(t2)+'">' +
         '<div><div class="kai-name">'+esc(t2)+'</div>' +
         '<div class="kai-cnt">'+n2+'\u4ef6</div></div>' +
         '<div style="display:flex;gap:6px;align-items:center">' +
         '<button class="sm-btn" data-rnm="'+esc(t2)+'">\u540d\u524d\u5909\u66f4</button>' +
         '<span style="color:var(--verL);font-size:20px">\u203a</span></div></div>';
  }

  // TSORT適用
  if (TSORT === 'name-asc') {
    ot.sort(function(a,b){ return a.localeCompare(b,'ja'); });
  } else if (TSORT === 'name-desc') {
    ot.sort(function(a,b){ return b.localeCompare(a,'ja'); });
  } else if (TSORT === 'cnt-desc') {
    ot.sort(function(a,b){ return (DB[b]||[]).length-(DB[a]||[]).length; });
  } else if (TSORT === 'cnt-asc') {
    ot.sort(function(a,b){ return (DB[a]||[]).length-(DB[b]||[]).length; });
  }

  if (ot.length > 0) {
    h += '<div class="sec-lbl">\u305d\u306e\u4ed6\u306e\u4f1a</div>';
    for (var k=0; k<ot.length; k++) {
      var t3 = ot[k];
      var n3 = (DB[t3]||[]).length;
      h += '<div class="kai-card" data-tab="'+esc(t3)+'">' +
           '<div><div class="kai-name">'+esc(t3)+'</div>' +
           '<div class="kai-cnt">'+n3+'\u4ef6</div></div>' +
           '<div style="display:flex;gap:6px;align-items:center">' +
           '<button class="sm-btn" data-rnm="'+esc(t3)+'">\u540d\u524d\u5909\u66f4</button>' +
           '<button class="sm-btn sm-btn-del" data-del="'+esc(t3)+'">\u524a\u9664</button>' +
           '<span style="color:var(--verL);font-size:20px">\u203a</span></div></div>';
    }
  }

  h += '<button class="add-btn" id="badd">+ \u4f1a\u3092\u8ffd\u52a0</button>';
  el.innerHTML = h;

  // Attach events
  var cards = el.querySelectorAll('.kai-card');
  for (var ci=0; ci<cards.length; ci++) {
    (function(card){
      var tab = card.getAttribute('data-tab');
      card.onclick = function(e){
        if (e.target.tagName === 'BUTTON') return;
        openTab(tab);
      };
    })(cards[ci]);
  }
  var rnmBtns = el.querySelectorAll('[data-rnm]');
  for (var ri=0; ri<rnmBtns.length; ri++) {
    (function(btn){
      var tab = btn.getAttribute('data-rnm');
      btn.onclick = function(e){ e.stopPropagation(); rnmKai(tab); };
    })(rnmBtns[ri]);
  }
  var delBtns = el.querySelectorAll('[data-del]');
  for (var di=0; di<delBtns.length; di++) {
    (function(btn){
      var tab = btn.getAttribute('data-del');
      btn.onclick = function(e){ e.stopPropagation(); delKai(tab); };
    })(delBtns[di]);
  }
  var bAdd = document.getElementById('badd');
  if (bAdd) bAdd.onclick = addKai;
  var tss = document.getElementById('top-sort-sel');
  if (tss) tss.onchange = function(){
    window.TOP_SORT = this.value;
    bldTop();
  };
}

function srted(arr) {
  var a = arr.slice();
  if (SORT === 'date-desc') a.sort(function(x,y){ return (y.date||'').localeCompare(x.date||''); });
  else if (SORT === 'date-asc') a.sort(function(x,y){ return (x.date||'').localeCompare(y.date||''); });
  else if (SORT === 'kaisu-asc') a.sort(function(x,y){ return parseInt(x.kaisu||0)-parseInt(y.kaisu||0); });
  else if (SORT === 'kaisu-desc') a.sort(function(x,y){ return parseInt(y.kaisu||0)-parseInt(x.kaisu||0); });
  else if (SORT === 'title-asc') a.sort(function(x,y){ return (x.title||'').localeCompare(y.title||''); });
  else if (SORT === 'title-desc') a.sort(function(x,y){ return (y.title||'').localeCompare(x.title||''); });
  return a;
}

function bldList(tab) {
  var el = document.getElementById('view-list');
  var arr = srted(DB[tab]||[]);
  var h = '<div class="list-hdr"><span>'+esc(tab)+'</span>' + (!/^\\d+$/.test(tab) ? '<button class="sm-btn" id="brnm-list">\u540d\u524d\u5909\u66f4</button>' : '') + '</div>';
  if (arr.length === 0) {
    h += '<div style="padding:24px;text-align:center;color:var(--textS)">\u307e\u3060\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093</div>';
  } else {
    for (var i=0; i<arr.length; i++) {
      var s = arr[i];
      var idx = (DB[tab]||[]).indexOf(s);
      h += '<div class="ses-row" data-idx="'+i+'">' +
           '<div class="ses-info">' +
           '<span class="ses-kaisu">' + (s.kaisu ? '\u7b2c'+esc(s.kaisu)+'\u56de' : '') + '</span>' +
           '<span class="ses-date">'+esc(s.date)+'</span>' +
           '</div>' +
           '<div class="ses-title">'+esc(s.title||'')+'</div>' +
           '<div class="ses-prog">';
      var progs = s.programs||[];
      for (var j=0; j<progs.length; j++) {
        h += '<span class="prog-chip">'+esc(progs[j].neta||'')+(progs[j].enjya?'<span class="prog-enjya"> '+esc(progs[j].enjya)+'</span>':'')+'</span>';
      }
      h += '</div></div>';
    }
  }
  h += '<button class="add-btn" id="badd-ses">+ \u56de\u3092\u8ffd\u52a0</button>';
  el.innerHTML = h;

  var brnm = document.getElementById('brnm-list');
  if (brnm) brnm.onclick = function(){ rnmKai(CT); };

  var rows = el.querySelectorAll('.ses-row');
  for (var ri=0; ri<rows.length; ri++) {
    (function(row){
      var si = parseInt(row.getAttribute('data-idx'));
      row.onclick = function(){ opnSes(si); };
    })(rows[ri]);
  }
  var bAddSes = document.getElementById('badd-ses');
  if (bAddSes) bAddSes.onclick = function(){ editSes(-1); };
}

function opnSes(i) {
  var arr = srted(DB[CT]||[]);
  var s = arr[i];
  if (!s) return;
  var realIdx = (DB[CT]||[]).indexOf(s);
  var el = document.getElementById('view-detail');
  var progs = s.programs||[];
  var ph = '';
  for (var j=0; j<progs.length; j++) {
    ph += '<div class="prog-row"><span class="prog-neta">'+esc(progs[j].neta||'')+'</span>' +
          (progs[j].enjya ? '<span class="prog-enjya-d"> / '+esc(progs[j].enjya)+'</span>' : '') + '</div>';
  }
  el.innerHTML = '<div class="det-hdr">'+esc(CT)+'</div>' +
    '<div class="det-info"><span class="ses-kaisu">'+(s.kaisu?'\u7b2c'+esc(s.kaisu)+'\u56de':'')+
    '</span> <span class="ses-date">'+esc(s.date)+'</span></div>' +
    '<div class="det-title">'+esc(s.title||'')+'</div>' +
    '<div class="det-progs">'+ph+'</div>' +
    '<div class="det-btns">' +
    '<button class="sm-btn" id="bedit">\u7de8\u96c6</button>' +
    '<button class="sm-btn sm-btn-del" id="bdel">\u524a\u9664</button></div>';
  push('detail');
  document.getElementById('bedit').onclick = function(){ editSes(realIdx); };
  document.getElementById('bdel').onclick = function(){ delSes(realIdx); };
}

function editSes(realIdx) {
  var s = realIdx >= 0 ? (DB[CT]||[])[realIdx] : {kaisu:'',date:'',title:'',programs:[]};
  if (!s) s = {kaisu:'',date:'',title:'',programs:[]};
  var progs = s.programs||[];
  var ph = '';
  for (var j=0; j<progs.length; j++) {
    ph += '<div class="pedit-row" data-j="'+j+'">' +
          '<input class="pneta" placeholder="\u6f14\u76ee" value="'+esc(progs[j].neta||'')+'">' +
          '<input class="penjya" placeholder="\u6f14\u8005" value="'+esc(progs[j].enjya||'')+'">' +
          '<button class="sm-btn sm-btn-del pdelrow">-</button></div>';
  }
  var el = document.getElementById('view-edit');
  el.innerHTML = '<div class="det-hdr">'+(realIdx>=0?'\u7de8\u96c6':'\u65b0\u898f\u8ffd\u52a0')+'</div>' +
    '<div class="erow"><label>\u56de\u6570</label><input id="ekaisu" placeholder="\u4f8b\uff1a12" value="'+esc(s.kaisu||'')+'"></div>' +
    '<div class="erow"><label>\u65e5\u6642</label><input id="edate" placeholder="\u4f8b\uff1a2024.3.15" value="'+esc(s.date||'')+'"></div>' +
    '<div class="erow"><label>\u30bf\u30a4\u30c8\u30eb</label><input id="etitle" placeholder="\u4f1a\u306e\u540d\u524d\u30fb\u30b5\u30d6\u30bf\u30a4\u30c8\u30eb" value="'+esc(s.title||'')+'"></div>' +
    '<div class="erow-lbl">\u6f14\u76ee</div>' +
    '<div id="progs-wrap">'+ph+'</div>' +
    '<button class="sm-btn" id="baddp">+ \u6f14\u76ee\u8ffd\u52a0</button>' +
    '<div class="ebtns"><button class="sm-btn" id="becancel">\u30ad\u30e3\u30f3\u30bb\u30eb</button>' +
    '<button class="sm-btn sm-btn-ok" id="besave">\u4fdd\u5b58</button></div>';
  push('edit');

  var pw = document.getElementById('progs-wrap');
  pw.onclick = function(e){
    if (e.target.classList.contains('pdelrow')) {
      e.target.parentNode.remove();
    }
  };
  document.getElementById('baddp').onclick = function(){
    var r = document.createElement('div');
    r.className = 'pedit-row';
    r.innerHTML = '<input class="pneta" placeholder="\u6f14\u76ee"><input class="penjya" placeholder="\u6f14\u8005"><button class="sm-btn sm-btn-del pdelrow">-</button>';
    pw.appendChild(r);
  };
  document.getElementById('becancel').onclick = back;
  document.getElementById('besave').onclick = function(){
    var ns = {
      kaisu: document.getElementById('ekaisu').value.trim(),
      date: document.getElementById('edate').value.trim(),
      title: document.getElementById('etitle').value.trim(),
      programs: []
    };
    var rows = pw.querySelectorAll('.pedit-row');
    for (var k=0; k<rows.length; k++) {
      var n = rows[k].querySelector('.pneta').value.trim();
      var e2 = rows[k].querySelector('.penjya').value.trim();
      if (n||e2) ns.programs.push({neta:n,enjya:e2});
    }
    if (!DB[CT]) DB[CT]=[];
    if (realIdx>=0) DB[CT][realIdx]=ns;
    else DB[CT].push(ns);
    sdb(); bldList(CT); back(); back();
    toast('\u4fdd\u5b58\u3057\u307e\u3057\u305f');
  };
}

function delSes(realIdx) {
  dlg('\u3053\u306e\u56de\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f', '\u524a\u9664', function(){
    DB[CT].splice(realIdx,1);
    sdb(); bldList(CT); back(); back();
    toast('\u524a\u9664\u3057\u307e\u3057\u305f');
  });
}

function openTab(t) {
  CT = t; STK = [];
  bldTabs(); bldList(t); push('list');
  document.getElementById('bbk').classList.remove('hidden');
}

function addKai() {
  dlg('\u65b0\u3057\u3044\u4f1a\u306e\u540d\u524d', '\u8ffd\u52a0', function(n){
    if (!n) return;
    if (DB[n]) { toast('\u3059\u3067\u306b\u5b58\u5728\u3057\u307e\u3059'); return; }
    DB[n]=[]; sdb(); bldTabs(); bldTop();
    toast('\u300c'+n+'\u300d\u3092\u8ffd\u52a0\u3057\u307e\u3057\u305f');
  }, true);
}

function rnmKai(tab) {
  dlg('\u65b0\u3057\u3044\u540d\u524d', '\u5909\u66f4', function(n){
    if (!n) return;
    if (DB[n]) { toast('\u3059\u3067\u306b\u5b58\u5728\u3057\u307e\u3059'); return; }
    DB[n]=DB[tab]; delete DB[tab];
    sdb(); if(CT===tab)CT=n; bldTabs();
    if (STK.includes('list')) bldList(CT); else bldTop();
    toast('\u300c'+tab+'\u300d\u2192\u300c'+n+'\u300d');
  }, true);
}

function delKai(tab) {
  dlg('\u300c'+tab+'\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f', '\u524a\u9664', function(){
    delete DB[tab];
    sdb(); if(CT===tab){CT=''; document.getElementById('htitle').textContent='\u6839\u591a\u5e33';}
    bldTabs(); bldTop();
    toast('\u300c'+tab+'\u300d\u3092\u524a\u9664\u3057\u307e\u3057\u305f');
  });
}

function dlg(title, ok, cb, hasInput) {
  document.getElementById('dlgt').textContent = title;
  document.getElementById('dlgi').style.display = hasInput ? '' : 'none';
  document.getElementById('dlgi').value = '';
  document.getElementById('dlgo').textContent = ok;
  DOK = function(){ cb(document.getElementById('dlgi').value.trim()); };
  document.getElementById('ov').classList.add('on');
  if (hasInput) setTimeout(function(){ document.getElementById('dlgi').focus(); }, 100);
}

document.getElementById('dlgc').onclick = function(){ document.getElementById('ov').classList.remove('on'); };
document.getElementById('dlgo').onclick = function(){ document.getElementById('ov').classList.remove('on'); if(DOK)DOK(); };

document.getElementById('bsch').onclick = function(){
  var sb = document.getElementById('search-bar');
  sb.classList.toggle('hidden');
  if (!sb.classList.contains('hidden')) document.getElementById('sinp').focus();
};

document.getElementById('sinp').oninput = function(){
  var q = this.value.trim();
  var el = document.getElementById('view-search-results');
  if (!q) { el.innerHTML=''; showV('top'); return; }
  var results = [];
  Object.keys(DB).forEach(function(tab){
    (DB[tab]||[]).forEach(function(s,i){
      var txt = (s.title||'')+(s.date||'')+(s.kaisu||'')+tab;
      (s.programs||[]).forEach(function(p){ txt+=p.neta+p.enjya; });
      if (txt.indexOf(q)>=0) results.push({tab:tab,s:s,i:i});
    });
  });
  var h='<div class="list-hdr">\u691c\u7d22\u7d50\u679c: '+esc(q)+'</div>';
  if (!results.length) h+='<div style="padding:24px;text-align:center;color:var(--textS)">\u8a72\u5f53\u306a\u3057</div>';
  results.forEach(function(r){
    var s=r.s;
    h+='<div class="ses-row" data-tab="'+esc(r.tab)+'" data-i="'+r.i+'">' +
       '<div class="ses-info"><span style="color:var(--textS);font-size:11px">'+esc(r.tab)+'</span> ' +
       '<span class="ses-kaisu">'+(s.kaisu?'\u7b2c'+esc(s.kaisu)+'\u56de':'')+
       '</span> <span class="ses-date">'+esc(s.date)+'</span></div>' +
       '<div class="ses-title">'+esc(s.title||'')+'</div></div>';
  });
  el.innerHTML=h;
  showV('search-results');
  var rows=el.querySelectorAll('.ses-row');
  rows.forEach(function(row){
    row.onclick=function(){
      var tab=row.getAttribute('data-tab');
      var si=parseInt(row.getAttribute('data-i'));
      openTab(tab); opnSes(si);
    };
  });
};

document.getElementById('bsc').onclick = function(){
  document.getElementById('search-bar').classList.add('hidden');
  document.getElementById('sinp').value='';
  document.getElementById('view-search-results').innerHTML='';
  showV('top');
};

document.getElementById('sort-sel').onchange = function(){
  SORT = this.value;
  if (CT) bldList(CT);
};

document.getElementById('bbk').onclick = function(){
  if (STK.length <= 1) {
    CT=''; STK=[];
    document.getElementById('tab-bar').classList.add('hidden');
    document.getElementById('bbk').classList.add('hidden');
    bldTop(); showV('top');
  } else {
    back();
  }
};

document.getElementById('bsv').onclick = function(e){
  e.stopPropagation();
  var m = document.getElementById('export-menu');
  m.classList.toggle('hidden');
};
document.addEventListener('click', function(){
  document.getElementById('export-menu').classList.add('hidden');
});
document.getElementById('export-menu').onclick = function(e){
  var act = e.target.getAttribute('data-act');
  if (!act) return;
  document.getElementById('export-menu').classList.add('hidden');
  if (act === 'json') {
    var blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    var u2 = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=u2; a.download='netacho_backup_'+new Date().toISOString().slice(0,10)+'.json';
    a.click(); URL.revokeObjectURL(u2);
    toast('\u30d0\u30c3\u30af\u30a2\u30c3\u30d7\u3092\u4fdd\u5b58\u3057\u307e\u3057\u305f');
  } else if (act === 'txt') {
    var tab = CT || null;
    var tabs = tab ? [tab] : Object.keys(DB);
    var lines = [];
    tabs.forEach(function(t){
      lines.push('\u25a0 ' + t + '\n');
      (DB[t]||[]).forEach(function(s){
        lines.push((s.kaisu?'\u7b2c'+s.kaisu+'\u56de ':'')+s.date+' '+(s.title||''));
        (s.programs||[]).forEach(function(p){
          lines.push('  \u300c'+(p.neta||'')+'\u300d'+(p.enjya?' '+p.enjya:''));
        });
        lines.push('');
      });
      lines.push('');
    });
    var blob = new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    var u2 = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=u2; a.download=(tab||'netacho_all')+'_'+new Date().toISOString().slice(0,10)+'.txt';
    a.click(); URL.revokeObjectURL(u2);
    toast('\u30c6\u30ad\u30b9\u30c8\u3092\u4fdd\u5b58\u3057\u307e\u3057\u305f');
  } else if (act === 'print') {
    window.print();
  }
};

// Start
bldTop();
showV('top');
</script>
</body>
</html>
